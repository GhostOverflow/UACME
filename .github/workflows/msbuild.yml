name: Build UACME

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild Source/uacme.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UACME
        path: |
          Source/Akagi/output/x64/Release/Akagi.exe
          Source/Yuubari/output/x64/Release/Yuubari.exe
